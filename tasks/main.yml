---
# tasks file for mikrotik
- name: Display resource statistics (routeros)
  community.routeros.command:
    commands: /system resource print
  register: routeros_resources
  when: ansible_network_os == 'community.routeros.routeros'

- name: debug
  ansible.builtin.debug:
    var: routeros_resources


- name: make flash dir
  ansible.builtin.shell: >-
    sshpass -p '{{ ansible_ssh_pass }}' ssh -o StrictHostKeyChecking=accept-new {{ ansible_user }}@{{ ansible_host }} /file add type=directory name=/flash
  #register: result
  ignore_errors: true
  no_log: true
  when: ansible_network_os == 'community.routeros.routeros'


- name: define tmp file name for rendering config.rsc for {{ inventory_hostname }}
  ansible.builtin.set_fact:
    mikrotik_tmpfile: "/tmp/{{ mikrotik.filespath | trim('/') | replace('/', '-') }}-{{ inventory_hostname }}-config.rsc"
  
- name: render config.rsc for {{ inventory_hostname }}
  ansible.builtin.template:
    src: "{{ mikrotik.filespath }}/{{ inventory_hostname }}/config.rsc"
    dest: "{{ mikrotik_tmpfile }}"
  delegate_to: localhost

- name: copy rendered config.rsc for {{ inventory_hostname }} to flash disk on routeros
  ansible.netcommon.net_put:
    src: "{{ mikrotik_tmpfile }}"
    dest: "/flash/config.rsc"
    protocol: sftp
    mode: binary

- name: Ensure rendered config.rsc for {{ inventory_hostname }} exists before shredding
  ansible.builtin.stat:
    path: "{{ mikrotik_tmpfile }}"
  delegate_to: localhost
  register: tmp_stat

- name: Fail if rendered config.rsc for {{ inventory_hostname }} is missing (unexpected)
  ansible.builtin.assert:
    that:
      - tmp_stat.stat.exists
      - tmp_stat.stat.isreg
    fail_msg: "Expected tmpfile to exist and be a regular file: {{ mikrotik_tmpfile }}"
  delegate_to: localhost

- name: Shred and remove rendered config.rsc for {{ inventory_hostname }} (fail hard)
  ansible.builtin.command:
    argv:
      - shred
      - --remove
      - --zero
      - --force
      - "{{ mikrotik_tmpfile }}"
  delegate_to: localhost
  register: shred_result
  changed_when: true

- name: Verify rendered config.rsc for {{ inventory_hostname }} is gone
  ansible.builtin.stat:
    path: "{{ mikrotik_tmpfile }}"
  delegate_to: localhost
  register: tmp_stat_after

- name: Fail if rendered config.rsc for {{ inventory_hostname }} still exists
  ansible.builtin.assert:
    that:
      - not tmp_stat_after.stat.exists
    fail_msg: "Shred reported success but tmpfile still exists: {{ mikrotik_tmpfile }}"
  delegate_to: localhost

- name: copy files for {{inventory_hostname}} to flash disk on routeros
  ansible.netcommon.net_put:
    src: "{{ mikrotik.filespath }}/{{ inventory_hostname }}/{{ item }}"
    dest: "/flash/{{ item }}"
    protocol: sftp
    mode: binary
  loop:
    - ssh_host_rsa
    - ssh_host_rsa.pub
    - www-ssl.key
    - ca.crt
    - www-ssl.crt

- name: Deploy config
  ansible.builtin.shell: >-
    sshpass -p '{{ ansible_ssh_pass }}' ssh {{ ansible_user }}@{{ ansible_host }} /system reset-configuration no-defaults=yes skip-backup=yes run-after-reset=flash/config.rsc
  #register: result
  ignore_errors: true
  changed_when:
    - '"Received disconnect" in result.stderr'
  #community.routeros.command:
  #  commands: 
  #    - /system reset-configuration no-defaults=yes skip-backup=yes run-after-reset=flash/config.rsc
  #  #interval: 20
  #  #retries: 1
  #  #commands: /system resource print
  no_log: true
  when: ansible_network_os == 'community.routeros.routeros'
